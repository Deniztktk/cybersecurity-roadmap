<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siber Güvenlik & Teknoloji Yol Haritaları</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f6eedb;
  --paper2: #ede3c8;
  --paper3: #e2d5b0;
  --spine: #2b1206;
  --ink: #1c120a;
  --ink2: #3a2a18;
  --muted: #7a6144;
  --ruled: rgba(160,130,80,.13);
  --gold: #b08a20;
  --gold2: #d4aa44;
  --red: #8a1c1c;
  --shadow: rgba(0,0,0,.32);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:'Crimson Pro',Georgia,serif;
  background:#0d0804;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px 16px 56px;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 20%,#241208,#080402);
  z-index:-1;
}

.shelf-label{
  font-family:'Playfair Display',serif;
  color:rgba(176,138,32,.55);
  font-size:.75rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin-bottom:20px;
}

.book-wrap{
  position:relative;
  width:min(900px,97vw);
}

.arr{
  position:absolute;top:50%;
  transform:translateY(-50%);
  z-index:200;
  background:var(--spine);
  border:none;border-radius:50%;
  width:42px;height:42px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 14px var(--shadow);
  transition:background .18s,transform .15s;
}
.arr:hover{background:var(--red);transform:translateY(-50%) scale(1.09)}
.arr svg{stroke:var(--gold2);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.arr-l{left:-52px}
.arr-r{right:-52px}

.pips{display:flex;gap:5px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.pip{
  width:7px;height:7px;border-radius:50%;
  background:rgba(176,138,32,.22);
  cursor:pointer;transition:background .25s,transform .2s;
}
.pip.on{background:var(--gold2);transform:scale(1.3)}

.book{
  position:relative;
  width:100%;
  aspect-ratio:1.5/1;
  perspective:2200px;
  transform-style:preserve-3d;
}
  
.spine-glow{
  position:absolute;top:0;left:50%;
  width:26px;height:100%;
  transform:translateX(-50%);
  background:linear-gradient(to right,
    rgba(0,0,0,.22) 0%,
    rgba(0,0,0,.06) 35%,
    rgba(255,220,100,.04) 50%,
    rgba(0,0,0,.06) 65%,
    rgba(0,0,0,.18) 100%);
  pointer-events:none;z-index:60;
}

.right-panel{
  position:absolute;
  top:0;left:50%;width:50%;height:100%;
  background:var(--paper);
  overflow:hidden;z-index:1;
}
.right-panel::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 25px,var(--ruled) 25px,var(--ruled) 26px);
  pointer-events:none}
.right-panel::after{content:'';position:absolute;top:0;left:0;
  width:18px;height:100%;
  background:linear-gradient(to right,rgba(0,0,0,.09),transparent);
  pointer-events:none}

.pg{
  position:absolute;
  top:0;left:0;width:50%;height:100%;
  transform-origin:right center;
  transform-style:preserve-3d;
  transition:transform .65s cubic-bezier(.6,.05,.4,.95);
  z-index:2;
  cursor:pointer;
}
.pg.flipped{transform:rotateY(-180deg)}

.pg-front,.pg-back{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}
.pg-back{transform:rotateY(180deg)}

.paper{
  width:100%;height:100%;
  background:var(--paper);
  position:relative;overflow:hidden;
}
.paper::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 25px,var(--ruled) 25px,var(--ruled) 26px);
  pointer-events:none}

.paper.left-page::after{
  content:'';position:absolute;top:0;right:0;
  width:22px;height:100%;
  background:linear-gradient(to left,rgba(0,0,0,.12),transparent);
  pointer-events:none}

.cover{
  width:100%;height:100%;
  background:linear-gradient(160deg,#3a1a06 0%,#1e0d03 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;position:relative;overflow:hidden;
}
.cover-border{
  position:absolute;inset:14px;
  border:.8px solid rgba(176,138,32,.38);
  pointer-events:none;
}
.cover-border2{
  position:absolute;inset:20px;
  border:.3px solid rgba(176,138,32,.18);
  pointer-events:none;
}
.co{position:absolute;width:28px;height:28px;border-color:rgba(176,138,32,.4);border-style:solid}
.co-tl{top:22px;left:22px;border-width:1.5px 0 0 1.5px}
.co-tr{top:22px;right:22px;border-width:1.5px 1.5px 0 0}
.co-bl{bottom:22px;left:22px;border-width:0 0 1.5px 1.5px}
.co-br{bottom:22px;right:22px;border-width:0 1.5px 1.5px 0}
.cover-eyebrow{font-family:'Crimson Pro',serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(176,138,32,.5);position:relative;z-index:1}
.cover-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.2rem,3vw,2rem);
  color:var(--gold2);
  text-align:center;line-height:1.2;
  padding:0 28px;position:relative;z-index:1;
}
.cover-rule{width:50px;height:1px;background:var(--gold);opacity:.5;position:relative;z-index:1}
.cover-sub{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(176,138,32,.45);position:relative;z-index:1}
.cover-foot{position:absolute;bottom:24px;font-size:.6rem;letter-spacing:.15em;color:rgba(176,138,32,.3)}

.pc{
  padding:clamp(14px,2.8%,26px) clamp(16px,3.2%,28px);
  height:100%;
  display:flex;flex-direction:column;
  gap:8px;
  overflow:hidden;
  position:relative;z-index:1;
}
.pc-left{padding-right:clamp(12px,2.5%,22px)}
.pc-right{padding-left:clamp(16px,3%,24px)}

.eyebrow{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.ch-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(.95rem,2.5vw,1.5rem);
  color:var(--ink);
  border-bottom:1.2px solid var(--gold);
  padding-bottom:6px;
  line-height:1.15;
}
.ch-sub{font-size:.7rem;color:var(--muted);font-style:italic;margin-top:-4px}
.sec{font-size:.58rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-top:6px}

.tbl{width:100%;border-collapse:collapse;font-size:.72rem}
.tbl th{
  font-family:'Playfair Display',serif;
  font-size:.6rem;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);
  border-bottom:.8px solid var(--paper3);
  padding:3px 5px;text-align:left;
}
.tbl td{
  padding:4px 5px;
  border-bottom:.3px solid rgba(160,130,80,.12);
  color:var(--ink2);
  vertical-align:top;
  line-height:1.4;
}
.tbl tr:last-child td{border-bottom:none}
.tbl .lv{
  font-size:.58rem;font-weight:600;
  padding:2px 5px;border-radius:2px;
  white-space:nowrap;
  text-align:center;
}
.tbl .col-lv{width:15%}
.tbl .col-topics{width:50%}
.tbl .col-tools{width:35%}

.b-gir{background:#e8ddc4;color:#3d1f0a}
.b-tem{background:#c9ba9b;color:#2c1508}
.b-ort{background:#8a1c1c;color:#f5eedb}
.b-ilr{background:#1e0d03;color:#d4aa44}

.rtbl{width:100%;border-collapse:collapse;font-size:.7rem}
.rtbl td{padding:3px 5px;border-bottom:.3px solid rgba(160,130,80,.1);color:var(--ink2);vertical-align:top;line-height:1.4}
.rtbl tr:last-child td{border-bottom:none}
.rtbl .rt-name{font-style:italic}
.rtbl .rt-auth{color:var(--muted);font-size:.65rem}
.rtbl .rt-cat{
  font-size:.55rem;font-weight:600;letter-spacing:.06em;
  padding:1px 4px;border-radius:2px;
  white-space:nowrap;
  background:var(--paper3);color:var(--muted);
}

.proj-grid{display:flex;flex-direction:column;gap:4px}
.proj-row{display:flex;gap:6px;align-items:flex-start}
.proj-lv{font-size:.58rem;font-weight:600;padding:2px 5px;border-radius:2px;flex-shrink:0;margin-top:1px}
.proj-t{font-size:.7rem;color:var(--ink2);line-height:1.4}
  
.toc-rows{display:flex;flex-direction:column;gap:5px}
.toc-row{display:flex;align-items:baseline;gap:4px;cursor:pointer;transition:color .15s}
.toc-row:hover .toc-name{color:var(--red)}
.toc-n{font-family:'Playfair Display',serif;color:var(--gold);font-size:.9rem;width:22px;flex-shrink:0}
.toc-name{font-size:.78rem;color:var(--ink2)}
.toc-dots{flex:1;border-bottom:.6px dotted var(--paper3);margin:0 5px 3px}
.toc-pg{font-size:.62rem;color:var(--muted)}
.toc-tag{font-size:.55rem;padding:1px 5px;border-radius:2px;margin-left:5px;vertical-align:middle}

.pgn{margin-top:auto;padding-top:5px;border-top:.4px solid var(--paper3);font-size:.6rem;color:var(--muted);text-align:center;letter-spacing:.1em}

.soc-row{display:flex;align-items:baseline;gap:6px;padding:3px 0;border-bottom:.3px solid rgba(160,130,80,.1)}
.soc-row:last-child{border-bottom:none}
.soc-h{font-size:.7rem;font-weight:600;color:var(--ink);min-width:90px}
.soc-d{font-size:.65rem;color:var(--muted);line-height:1.4}

.hint{margin-top:14px;font-size:.68rem;color:rgba(176,138,32,.35);letter-spacing:.1em;text-align:center}

.accent-line{display:block;width:32px;height:2px;margin-top:5px}
</style>

function makeSpreads(){
  const s = [{left:'cover', right:'toc'}];
  MODULES.forEach((m,i)=>{
    s.push({left:{type:'levels',mod:m,pg:(i*2+2)}, right:{type:'resources',mod:m,pg:(i*2+3)}});
  });
  return s;
}
const SPREADS = makeSpreads();
const TOTAL = SPREADS.length;

let cur = 0;

function badge(lv){
  const map={Giriş:'b-gir',Temel:'b-tem',Orta:'b-ort',İleri:'b-ilr'};
  return `<span class="lv ${map[lv]||'b-gir'}">${lv}</span>`;
}

function renderLevels(m,pg){
  return `<div class="pc pc-left">
    <div class="eyebrow">Bölüm ${MODULES.indexOf(m)+1} · Seviyeler</div>
    <div class="ch-title" style="border-color:${m.color}">${m.title}</div>
    <div class="ch-sub">${m.sub}</div>
    <div class="sec">Seviye haritası</div>
    <table class="tbl">
      <thead><tr>
        <th class="col-lv">Seviye</th>
        <th class="col-topics">Konular</th>
        <th class="col-tools">Araçlar</th>
      </tr></thead>
      <tbody>
        ${m.levels.map(r=>`<tr>
          <td>${badge(r.lv)}</td>
          <td>${r.topics}</td>
          <td style="color:var(--muted);font-size:.65rem">${r.tools}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="sec">Proje fikirleri</div>
    <div class="proj-grid">
      ${m.projects.map(p=>`<div class="proj-row">
        <span class="proj-lv ${({Giriş:'b-gir',Temel:'b-tem',Orta:'b-ort',İleri:'b-ilr'})[p.lv]||'b-gir'}">${p.lv}</span>
        <span class="proj-t">${p.t}</span>
      </div>`).join('')}
    </div>
    <div class="pgn">— ${pg} —</div>
  </div>`;
}

function renderResources(m,pg){
  return `<div class="pc pc-right">
    <div class="eyebrow">${m.title} · Kaynaklar</div>
    <div class="ch-title" style="border-color:${m.color}">Kitaplar & Takip</div>
    <div class="sec">Okunacak kitaplar</div>
    <table class="rtbl">
      <tbody>
        ${m.books.map(b=>`<tr>
          <td><span class="rt-cat">${b.cat}</span></td>
          <td><span class="rt-name">${b.name}</span><br><span class="rt-auth">${b.auth}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="sec">Takip edilecek hesaplar</div>
    ${m.social.map(s=>`<div class="soc-row">
      <span class="soc-h">${s.h}</span>
      <span class="soc-d">${s.d}</span>
    </div>`).join('')}
    <div class="sec">Platform önerileri</div>
    <table class="rtbl"><tbody>
      <tr><td><span class="rt-cat">Pratik</span></td><td>TryHackMe — rehberli, başlangıç dostu</td></tr>
      <tr><td><span class="rt-cat">Pratik</span></td><td>HackTheBox — gerçekçi lab ortamları</td></tr>
      <tr><td><span class="rt-cat">CTF</span></td><td>CTFtime.org — etkinlik takvimi</td></tr>
      <tr><td><span class="rt-cat">Web</span></td><td>PortSwigger Web Academy — ücretsiz</td></tr>
    </tbody></table>
    <div class="pgn">— ${pg} —</div>
  </div>`;
}

function renderTOC(){
  const rows = MODULES.map((m,i)=>{
    const pg = i*2+2;
    return `<div class="toc-row" onclick="goTo(${i+1})">
      <span class="toc-n">${String(i+1).padStart(2,'0')}</span>
      <span class="toc-name">${m.title}</span>
      <span class="toc-dots"></span>
      <span class="toc-pg">${pg}–${pg+1}</span>
    </div>`;
  }).join('');
  return `<div class="pc pc-right">
    <div class="eyebrow">İçindekiler</div>
    <div class="ch-title">Modüller</div>
    <div class="ch-sub">Her modül: seviye haritası + proje fikirleri + kitaplar + takip</div>
    <div class="sec" style="margin-top:10px">Bölümler</div>
    <div class="toc-rows">${rows}</div>
    <div style="margin-top:8px;font-size:.65rem;color:var(--muted);font-style:italic;line-height:1.6">
      Her bölümde: Giriş → Temel → Orta → İleri seviye<br>
      yol haritası, araç listesi, kitap ve proje önerileri.
    </div>
    <div class="pgn">— 1 —</div>
  </div>`;
}

function renderCover(){
  return `<div class="cover">
    <div class="cover-border"></div><div class="cover-border2"></div>
    <div class="co co-tl"></div><div class="co co-tr"></div>
    <div class="co co-bl"></div><div class="co co-br"></div>
    <div class="cover-eyebrow">Topluluk Rehberi</div>
    <div class="cover-title">Siber Güvenlik<br>&amp; Teknoloji<br>Yol Haritaları</div>
    <div class="cover-rule"></div>
    <div class="cover-sub">8 Alan · Giriş'ten İleri'ye</div>
    <div class="cover-foot">2026 · Cassandra Community</div>
  </div>`;
}

const book = document.getElementById('book');
const rpc  = document.getElementById('rpc');

const pageEls = [];
for(let i=0;i<TOTAL-1;i++){
  const p = document.createElement('div');
  p.className='pg';
  p.style.zIndex = TOTAL - i;
  p.innerHTML = '<div class="pg-front"><div class="paper left-page"></div></div><div class="pg-back"><div class="paper left-page"></div></div>';
  book.appendChild(p);
  pageEls.push(p);
}

function getLeftHTML(spreadIdx){
  const sp = SPREADS[spreadIdx];
  if(!sp) return '';
  if(sp.left==='cover') return renderCover();
  const d = sp.left;
  if(d.type==='levels') return renderLevels(d.mod, d.pg);
  if(d.type==='resources') return renderResources(d.mod, d.pg);
  return '';
}

function getRightHTML(spreadIdx){
  const sp = SPREADS[spreadIdx];
  if(!sp) return '';
  if(sp.right==='toc') return renderTOC();
  const d = sp.right;
  if(d.type==='levels') return renderLevels(d.mod, d.pg);
  if(d.type==='resources') return renderResources(d.mod, d.pg);
  return '';
}

pageEls.forEach((p,i)=>{
  p.querySelector('.pg-front .paper').innerHTML = getLeftHTML(i);
  p.querySelector('.pg-back  .paper').innerHTML = getLeftHTML(i+1);
});

function updateRight(){
  rpc.innerHTML = getRightHTML(cur);
}

function buildPips(){
  const el = document.getElementById('pips');
  el.innerHTML='';
  SPREADS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pip'+(i===cur?' on':'');
    d.onclick=()=>goTo(i);
    el.appendChild(d);
  });
}

function applyState(){
  pageEls.forEach((p,i)=>{
    if(i < cur){
      p.classList.add('flipped');
      p.style.zIndex = i + 1;
    } else {
      p.classList.remove('flipped');
      p.style.zIndex = TOTAL - i;
    }
  });
  updateRight();
  buildPips();
}

function next(){if(cur<TOTAL-1){cur++;applyState()}}
function prev(){if(cur>0){cur--;applyState()}}

function goTo(idx){
  if(idx<0||idx>=TOTAL) return;
  cur=idx; applyState();
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
});

document.getElementById('book').addEventListener('click', e=>{
  const bk = document.getElementById('book').getBoundingClientRect();
  const mid = bk.left + bk.width/2;
  if(e.clientX > mid) next(); else prev();
});

applyState();
</script>
